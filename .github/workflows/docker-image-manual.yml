name: Manual Docker Image Build

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish to GHCR (for example: tokenlab-d3a93565)"
        required: true
        type: string
      push_latest:
        description: "Also push the latest tag"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Prepare tags
        id: tags
        run: |
          IMAGE="ghcr.io/${{ steps.owner.outputs.value }}/${{ github.event.repository.name }}"
          TAGS="$IMAGE:${{ github.event.inputs.image_tag }}"
          if [ "${{ github.event.inputs.push_latest }}" = "true" ]; then
            TAGS="$TAGS,$IMAGE:latest"
          fi
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "Published image:" >> "$GITHUB_STEP_SUMMARY"
          echo "- ${{ steps.tags.outputs.image }}:${{ github.event.inputs.image_tag }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event.inputs.push_latest }}" = "true" ]; then
            echo "- ${{ steps.tags.outputs.image }}:latest" >> "$GITHUB_STEP_SUMMARY"
          fi
